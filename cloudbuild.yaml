steps:
  - id: 'Install Dependencies and Build React App'
    name: 'gcr.io/cloud-builders/npm'
    args: ['install']

  - id: 'Build React App'
    name: 'gcr.io/cloud-builders/npm'
    env:
      - 'VITE_QUIZ_API_URL=https://quiz-backend-91248372939.us-central1.run.app'
      - 'VITE_FLASHCARD_API_URL=https://flashcard-backend-91248372939.us-central1.run.app'
      - 'VITE_AICHAT_API_URL=https://ai-chat-service-91248372939.us-central1.run.app'
      - 'VITE_NOTES_API_URL=https://notebook-service-91248372939.us-central1.run.app/api'
      - 'VITE_API_BASE_URL=https://login-service-91248372939.us-central1.run.app'
    args: ['run', 'build']
    dir: '.'

  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'rsync', '-r', 'dist', 'gs://arctic-sentry-467317-s7-studenthub-frontend']

  # ─── DAST Security Scan (StackHawk) ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'dast-scan'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull stackhawk/hawkscan:latest
        docker run --rm \
          -v $$(pwd):/hawk \
          -e HAWK_API_KEY="$$HAWK_API_KEY" \
          -e HAWK_APP_ID="$$HAWK_API_ID" \
          -e DAST_TEST_EMAIL="$$DAST_TEST_EMAIL" \
          -e DAST_TEST_PASSWORD="$$DAST_TEST_PASSWORD" \
          stackhawk/hawkscan:latest
    secretEnv:
      - 'HAWK_API_KEY'
      - 'HAWK_API_ID'
      - 'DAST_TEST_EMAIL'
      - 'DAST_TEST_PASSWORD'

# ─── Secrets from Google Secret Manager ────────────────────────────────────────
availableSecrets:
  secretManager:
    - versionName: projects/arctic-sentry-467317-s7/secrets/HAWK_API_KEY/versions/latest
      env: HAWK_API_KEY
    - versionName: projects/arctic-sentry-467317-s7/secrets/HAWK_API_ID/versions/latest
      env: HAWK_API_ID
    - versionName: projects/arctic-sentry-467317-s7/secrets/DAST_TEST_EMAIL/versions/latest
      env: DAST_TEST_EMAIL
    - versionName: projects/arctic-sentry-467317-s7/secrets/DAST_TEST_PASSWORD/versions/latest
      env: DAST_TEST_PASSWORD

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET